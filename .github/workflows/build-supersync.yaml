name: Auto-Build SuperSync for GHCR

on:
  schedule:
    - cron: "0 4 * * *" # Runs every day at 04:00 UTC
  workflow_dispatch: # Allows you to trigger it manually

# Required to push to GHCR
permissions:
  contents: read
  packages: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch latest release from Upstream
        id: upstream
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/super-productivity/super-productivity/releases/latest | jq -r .tag_name)
          echo "Latest upstream release tag is: $LATEST_TAG"
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Checkout super-productivity code
        uses: actions/checkout@v4
        with:
          repository: super-productivity/super-productivity
          ref: ${{ steps.upstream.outputs.tag }}

      - name: Get Package Version
        id: package
        run: |
          VERSION=$(jq -r .version package.json)
          echo "Found package version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image already exists on GHCR
        id: check_ghcr
        run: |
          VERSION=${{ steps.package.outputs.version }}

          if docker buildx imagetools inspect ghcr.io/codecrafter404/supersync:$VERSION > /dev/null 2>&1; then
            echo "Image ghcr.io/codecrafter404/supersync:$VERSION already exists. Skipping build!"
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "Image does not exist yet. Proceeding to build!"
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

      - name: Apply DB Migration Fix (Issue #7134)
        if: steps.check_ghcr.outputs.should_build == 'true'
        run: |
          SCRIPT_PATH="packages/super-sync-server/start_supersync_only.sh"
          DOCKERFILE_PATH="packages/super-sync-server/Dockerfile"

          echo "1. Creating startup script at $SCRIPT_PATH"
          cat << 'EOF' > $SCRIPT_PATH
          #!/bin/sh
          set -e
          INIT_FILE="/tmp/.supersync_initialized"
          if[ ! -f "$INIT_FILE" ]; then
              npx prisma db push --accept-data-loss
              for migration in $(ls -1 /app/prisma/migrations | grep -E '^[0-9]+' | sort); do
                  npx prisma migrate resolve --applied "$migration" 2>/dev/null || true
              done
              touch "$INIT_FILE"
          fi
          npx prisma migrate deploy
          node dist/src/index.js
          EOF

          # Make the script executable
          chmod +x $SCRIPT_PATH

          echo "2. Patching $DOCKERFILE_PATH"
          # Appending the new COPY and CMD instructions to the end of the Dockerfile.
          # We removed the 'sed' command because Docker inherently uses the LAST 
          # CMD instruction defined in the file. This safely overrides the original
          # CMD without breaking the multi-line HEALTHCHECK above it.
          cat << 'EOF' >> $DOCKERFILE_PATH

          # --- INJECTED FIX FOR ISSUE #7134 ---
          COPY --from=builder --chown=supersync:nodejs /repo/packages/super-sync-server/start_supersync_only.sh ./
          CMD ["sh", "-c", "./start_supersync_only.sh"]
          EOF
      - name: Build image with Docker Compose
        if: steps.check_ghcr.outputs.should_build == 'true'
        run: |
          docker compose -f ./packages/super-sync-server/docker-compose.build.yml build

      - name: Tag and Push Images to GHCR
        if: steps.check_ghcr.outputs.should_build == 'true'
        run: |
          VERSION=${{ steps.package.outputs.version }}
          IFS='.' read -r major minor patch <<< "$VERSION"

          # Tag images for GHCR
          docker tag supersync:local ghcr.io/codecrafter404/supersync:$VERSION
          docker tag supersync:local ghcr.io/codecrafter404/supersync:$major.$minor
          docker tag supersync:local ghcr.io/codecrafter404/supersync:$major
          docker tag supersync:local ghcr.io/codecrafter404/supersync:latest

          echo "Pushing images to GHCR..."
          docker push ghcr.io/codecrafter404/supersync:$VERSION
          docker push ghcr.io/codecrafter404/supersync:$major.$minor
          docker push ghcr.io/codecrafter404/supersync:$major
          docker push ghcr.io/codecrafter404/supersync:latest
